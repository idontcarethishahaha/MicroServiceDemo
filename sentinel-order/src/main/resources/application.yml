server:
  port: 14301 # 端口号
spring:
  application:
    name: sentinel-order # 项目名称
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.227.128:8848 # # nacos地址，集群使用逗号分割
        namespace: public # 命名空间ID值，默认 public
        group: DEFAULT_GROUP # 微服务分组，默认 DEFAULT_GROUP
        cluster-name: DEFAULT # 微服务集群名称，默认 DEFAULT
        username: nacos # 管控台账号
        password: nacos # 管控台密码
    sentinel:
      transport:
        port: 8888
        dashboard: 192.168.227.128:8808